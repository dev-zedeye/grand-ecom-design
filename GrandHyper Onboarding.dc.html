<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    @keyframes floatA {
      0%,100% { transform:translate(-50%,-50%) translateY(0px) rotate(0deg); }
      38%     { transform:translate(-50%,-50%) translateY(-16px) rotate(4deg); }
      72%     { transform:translate(-50%,-50%) translateY(8px) rotate(-3deg); }
    }
    @keyframes floatB {
      0%,100% { transform:translate(-50%,-50%) translateY(0px) rotate(-8deg); }
      50%     { transform:translate(-50%,-50%) translateY(-20px) rotate(7deg); }
    }
    @keyframes floatC {
      0%,100% { transform:translate(-50%,-50%) translateY(10px) rotate(14deg); }
      50%     { transform:translate(-50%,-50%) translateY(-10px) rotate(22deg); }
    }
    @keyframes pulseCircle {
      0%,100% { transform:translate(-50%,-50%) scale(1); opacity:1; }
      50%     { transform:translate(-50%,-50%) scale(1.08); opacity:0.78; }
    }
    @keyframes fadeInUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { margin:0; }
  </style>
</helmet>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(150deg,#0c0c1e 0%,#18102e 55%,#081820 100%);padding:48px 24px;position:relative;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif">

  <!-- Ambient glow behind phone -->
  <div style="{{ bgGlowStyle }}"></div>

  <!-- Phone bezel -->
  <div
    style="width:390px;height:844px;border-radius:54px;background:#000;position:relative;overflow:hidden;flex-shrink:0;z-index:1;box-shadow:0 0 0 1.5px #2e2e3a,0 0 0 3.5px #111116,0 80px 180px rgba(0,0,0,0.9),inset 0 0 0 1px rgba(255,255,255,0.06)"
    onMouseDown="{{ onMouseDown }}"
    onMouseUp="{{ onMouseUp }}"
    onTouchStart="{{ onTouchStart }}"
    onTouchEnd="{{ onTouchEnd }}">

    <!-- Dynamic island -->
    <div style="position:absolute;top:12px;left:50%;transform:translateX(-50%);width:130px;height:37px;background:#000;border-radius:20px;z-index:30;pointer-events:none"></div>

    <!-- Screen (background color animates) -->
    <div style="{{ screenStyle }}">

      <!-- ── ONBOARDING ── -->
      <sc-if value="{{ notDone }}" hint-placeholder-val="{{ true }}">

        <!-- Status bar -->
        <div style="position:absolute;top:0;left:0;right:0;height:56px;z-index:20;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 12px">
          <span style="color:rgba(15,15,15,0.88);font-weight:700;font-size:16px;letter-spacing:-0.4px">9:41</span>
          <div style="display:flex;gap:6px;align-items:center">
            <svg width="18" height="12" viewBox="0 0 18 12" fill="rgba(15,15,15,0.82)">
              <rect x="0" y="8" width="3.5" height="4" rx="1"></rect>
              <rect x="5" y="5.5" width="3.5" height="6.5" rx="1"></rect>
              <rect x="10" y="2.5" width="3.5" height="9.5" rx="1"></rect>
              <rect x="15" y="0" width="3" height="12" rx="1"></rect>
            </svg>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
              <ellipse cx="8" cy="10.5" rx="1.6" ry="1.6" fill="rgba(15,15,15,0.82)"></ellipse>
              <path d="M4.5 7.2C5.7 5.7 6.8 4.8 8 4.8S10.3 5.7 11.5 7.2" stroke="rgba(15,15,15,0.82)" stroke-width="1.4" stroke-linecap="round" fill="none"></path>
              <path d="M1.5 4C3.3 1.8 5.5 0.6 8 0.6S12.7 1.8 14.5 4" stroke="rgba(15,15,15,0.82)" stroke-width="1.4" stroke-linecap="round" fill="none"></path>
            </svg>
            <svg width="26" height="12" viewBox="0 0 26 12" fill="none">
              <rect x="0.5" y="0.5" width="22" height="11" rx="3.5" stroke="rgba(15,15,15,0.55)"></rect>
              <rect x="23" y="4" width="2.5" height="4" rx="1" fill="rgba(15,15,15,0.55)"></rect>
              <rect x="2" y="2" width="18" height="8" rx="2" fill="rgba(15,15,15,0.82)"></rect>
            </svg>
          </div>
        </div>

        <!-- Skip button -->
        <button
          onClick="{{ skip }}"
          style="position:absolute;top:60px;right:20px;z-index:20;background:rgba(255,255,255,0.24);border:none;border-radius:24px;padding:9px 22px;font-size:14px;font-weight:600;color:rgba(20,20,20,0.88);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:0.1px;transition:background 0.15s ease;backdrop-filter:blur(6px)"
          style-hover="background:rgba(255,255,255,0.38)">Skip</button>

        <!-- Fading layer: circle + items + card -->
        <div style="{{ contentLayerStyle }}">

          <!-- Soft glow circle -->
          <div style="{{ circleStyle }}"></div>

          <!-- Floating food emojis -->
          <div style="position:absolute;top:54px;left:0;right:0;bottom:360px;overflow:hidden">
            <sc-for list="{{ items }}" as="item" hint-placeholder-count="4">
              <span style="{{ item.style }}">{{ item.emoji }}</span>
            </sc-for>
          </div>

          <!-- White bottom card -->
          <div style="position:absolute;bottom:0;left:0;right:0;height:360px;background:#FAFAF8;border-radius:32px 32px 0 0;padding:26px 28px 32px;display:flex;flex-direction:column">

            <!-- Pagination dots -->
            <div style="display:flex;gap:7px;align-items:center">
              <sc-for list="{{ dots }}" as="dot" hint-placeholder-count="3">
                <div style="{{ dot.style }}"></div>
              </sc-for>
            </div>

            <!-- Headline -->
            <div style="font-size:34px;font-weight:800;line-height:1.16;color:#141414;white-space:pre-line;margin-top:16px;letter-spacing:-0.9px">{{ title }}</div>

            <!-- Body text -->
            <p style="font-size:15px;line-height:1.65;color:#686868;font-weight:400;margin:10px 0 0">{{ subtitle }}</p>

            <!-- CTA buttons -->
            <div style="display:flex;gap:12px;align-items:center;margin-top:auto;padding-top:12px">
              <button
                onClick="{{ goNext }}"
                style="flex:1;height:58px;background:#E53935;border:none;border-radius:29px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:0.3px;transition:transform 0.12s ease,opacity 0.12s ease"
                style-hover="opacity:0.92"
                style-active="transform:scale(0.97)">{{ btnLabel }}</button>
              <button
                onClick="{{ goNext }}"
                style="width:58px;height:58px;background:#141414;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform 0.12s ease,opacity 0.12s ease"
                style-hover="opacity:0.78"
                style-active="transform:scale(0.93)">
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                  <path d="M8 5l7 6-7 6" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </button>
            </div>

            <!-- Home indicator -->
            <div style="width:134px;height:5px;background:#000;border-radius:3px;margin:18px auto 0;opacity:0.11"></div>

          </div>
        </div>

      </sc-if>

      <!-- ── DONE SCREEN ── -->
      <sc-if value="{{ done }}" hint-placeholder-val="{{ false }}">
        <div style="position:absolute;top:0;right:0;bottom:0;left:0;background:#FAFAF8;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 32px;animation:fadeInUp 0.38s ease 0.08s both">

          <div style="width:86px;height:86px;background:linear-gradient(148deg,#EF5350 0%,#C62828 100%);border-radius:24px;display:flex;align-items:center;justify-content:center;margin-bottom:28px;box-shadow:0 18px 52px rgba(229,57,53,0.4)">
            <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
              <path d="M11 22L19 30L33 14" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </div>

          <div style="font-size:30px;font-weight:800;color:#141414;letter-spacing:-0.8px;text-align:center;line-height:1.15">You're all set!</div>
          <div style="font-size:15px;color:#8a8a8a;margin-top:12px;text-align:center;line-height:1.65;max-width:268px">GrandHyper is ready to deliver the freshest groceries right to your door.</div>

          <button style="margin-top:40px;width:100%;height:58px;background:#E53935;border:none;border-radius:29px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:0.3px;transition:transform 0.12s ease" style-active="transform:scale(0.97)">Start Shopping →</button>

          <div style="width:134px;height:5px;background:#000;border-radius:3px;margin:22px auto 0;opacity:0.1"></div>
        </div>
      </sc-if>

    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { currentSlide: 0, fading: false, done: false };

  slides = [
    {
      bg: '#FFB300',
      title: 'Fresh Groceries\nDelivered Fast',
      subtitle: 'Farm-fresh produce and 20,000+ products at your door in as little as 15 minutes.',
      items: [
        { emoji: '🍓', size: 112, x: '52%', y: '54%', anim: 'floatA', dur: 3.6, delay: '0s'   },
        { emoji: '🍅', size: 64,  x: '23%', y: '28%', anim: 'floatB', dur: 4.2, delay: '0.4s' },
        { emoji: '🥦', size: 58,  x: '82%', y: '63%', anim: 'floatC', dur: 3.9, delay: '0.8s' },
        { emoji: '🥕', size: 52,  x: '20%', y: '76%', anim: 'floatA', dur: 4.6, delay: '1.2s' },
      ],
    },
    {
      bg: '#FF6B35',
      title: 'Exclusive Deals\nEvery Day',
      subtitle: 'Save up to 40% on fresh produce, dairy, and pantry essentials with daily flash deals.',
      items: [
        { emoji: '🍊', size: 112, x: '50%', y: '52%', anim: 'floatB', dur: 3.7, delay: '0s'   },
        { emoji: '🍋', size: 64,  x: '78%', y: '27%', anim: 'floatA', dur: 4.0, delay: '0.5s' },
        { emoji: '🥭', size: 58,  x: '22%', y: '61%', anim: 'floatC', dur: 4.0, delay: '0.9s' },
        { emoji: '🍑', size: 52,  x: '76%', y: '77%', anim: 'floatB', dur: 4.4, delay: '1.3s' },
      ],
    },
    {
      bg: '#00897B',
      title: 'Track Orders\nin Real Time',
      subtitle: 'Live delivery tracking, instant status updates, and a 30-minute delivery guarantee.',
      items: [
        { emoji: '🥑', size: 112, x: '50%', y: '53%', anim: 'floatC', dur: 3.8, delay: '0s'   },
        { emoji: '🥝', size: 64,  x: '24%', y: '30%', anim: 'floatA', dur: 4.1, delay: '0.6s' },
        { emoji: '🫐', size: 58,  x: '80%', y: '58%', anim: 'floatB', dur: 3.9, delay: '1.0s' },
        { emoji: '🍇', size: 52,  x: '79%', y: '25%', anim: 'floatC', dur: 4.5, delay: '0.3s' },
      ],
    },
  ];

  touchStartX = 0;
  mouseStartX = 0;
  isDragging = false;

  advance(dir) {
    if (this.state.fading) return;
    const next = this.state.currentSlide + dir;
    if (next >= this.slides.length) {
      this.setState({ fading: true });
      setTimeout(() => this.setState({ done: true, fading: false }), 300);
      return;
    }
    if (next < 0) return;
    this.setState({ fading: true });
    setTimeout(() => this.setState({ currentSlide: next, fading: false }), 280);
  }

  renderVals() {
    const { currentSlide, fading, done } = this.state;
    const slide = this.slides[currentSlide];
    const isLast = currentSlide === this.slides.length - 1;

    return {
      done,
      notDone: !done,

      bgGlowStyle: {
        position: 'absolute',
        width: '720px',
        height: '720px',
        borderRadius: '50%',
        background: slide.bg,
        opacity: 0.13,
        filter: 'blur(140px)',
        left: '50%',
        top: '50%',
        transform: 'translate(-50%,-50%)',
        transition: 'background 0.65s ease',
        pointerEvents: 'none',
        zIndex: 0,
      },

      screenStyle: {
        width: '100%',
        height: '100%',
        position: 'relative',
        overflow: 'hidden',
        background: done ? '#FAFAF8' : slide.bg,
        transition: 'background 0.5s ease',
        fontFamily: "'Plus Jakarta Sans',sans-serif",
      },

      contentLayerStyle: {
        position: 'absolute',
        top: '0',
        right: '0',
        bottom: '0',
        left: '0',
        opacity: fading ? 0 : 1,
        transition: 'opacity 0.28s ease',
        pointerEvents: fading ? 'none' : 'auto',
      },

      circleStyle: {
        position: 'absolute',
        width: '256px',
        height: '256px',
        borderRadius: '50%',
        background: 'rgba(255,255,255,0.15)',
        left: '50%',
        top: '248px',
        transform: 'translate(-50%,-50%)',
        pointerEvents: 'none',
        animation: 'pulseCircle 4.2s ease-in-out infinite',
      },

      items: slide.items.map((item) => ({
        emoji: item.emoji,
        style: {
          position: 'absolute',
          left: item.x,
          top: item.y,
          fontSize: item.size + 'px',
          animation: item.anim + ' ' + item.dur + 's ease-in-out infinite ' + item.delay,
          filter: 'drop-shadow(0 12px 24px rgba(0,0,0,0.22))',
          userSelect: 'none',
          transform: 'translate(-50%,-50%)',
          lineHeight: '1',
          display: 'block',
          pointerEvents: 'none',
        },
      })),

      dots: this.slides.map((_, i) => ({
        style: {
          width: i === currentSlide ? '30px' : '8px',
          height: '8px',
          borderRadius: '4px',
          background: i === currentSlide ? '#E53935' : '#D2D2D2',
          transition: 'all 0.35s cubic-bezier(0.34,1.56,0.64,1)',
          flexShrink: '0',
        },
      })),

      title: slide.title,
      subtitle: slide.subtitle,
      btnLabel: isLast ? 'Get Started' : 'Continue',

      goNext: () => this.advance(1),

      skip: () => {
        if (this.state.fading) return;
        this.setState({ fading: true });
        setTimeout(() => this.setState({ done: true, fading: false }), 300);
      },

      onTouchStart: (e) => { this.touchStartX = e.touches[0].clientX; },
      onTouchEnd: (e) => {
        const dx = e.changedTouches[0].clientX - this.touchStartX;
        if (Math.abs(dx) > 50) this.advance(dx < 0 ? 1 : -1);
      },
      onMouseDown: (e) => { this.mouseStartX = e.clientX; this.isDragging = true; },
      onMouseUp: (e) => {
        if (!this.isDragging) return;
        this.isDragging = false;
        const dx = e.clientX - this.mouseStartX;
        if (Math.abs(dx) > 50) this.advance(dx < 0 ? 1 : -1);
      },
    };
  }
}
</script>
</body>
</html>
