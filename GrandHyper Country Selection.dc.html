<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    @keyframes cardPop {
      0%   { transform:scale(0.97); opacity:0.7; }
      60%  { transform:scale(1.01); }
      100% { transform:scale(1); opacity:1; }
    }
    @keyframes fadeSlide {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { margin:0; }
  </style>
</helmet>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(150deg,#0c0c1e 0%,#18102e 55%,#081820 100%);padding:48px 24px;position:relative;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif">

  <!-- Ambient glow -->
  <div style="position:absolute;width:640px;height:640px;border-radius:50%;background:#E53935;opacity:0.1;filter:blur(130px);left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0"></div>

  <!-- Phone bezel -->
  <div style="width:390px;height:844px;border-radius:54px;background:#000;position:relative;overflow:hidden;flex-shrink:0;z-index:1;box-shadow:0 0 0 1.5px #2e2e3a,0 0 0 3.5px #111116,0 80px 180px rgba(0,0,0,0.9),inset 0 0 0 1px rgba(255,255,255,0.06)">

    <!-- Dynamic island -->
    <div style="position:absolute;top:12px;left:50%;transform:translateX(-50%);width:130px;height:37px;background:#000;border-radius:20px;z-index:30;pointer-events:none"></div>

    <!-- Screen -->
    <div style="width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;background:#F2F1EE">

      <!-- ══ RED HEADER ══ -->
      <div style="flex-shrink:0;background:linear-gradient(148deg,#FF5252 0%,#E53935 45%,#C62828 100%);border-radius:0 0 38px 38px;padding-bottom:24px;box-shadow:0 12px 40px rgba(229,57,53,0.32)">

        <!-- Status bar (always LTR) -->
        <div dir="ltr" style="height:56px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 12px">
          <span style="color:rgba(255,255,255,0.92);font-weight:700;font-size:16px;letter-spacing:-0.4px">9:41</span>
          <div style="display:flex;gap:6px;align-items:center">
            <svg width="18" height="12" viewBox="0 0 18 12" fill="rgba(255,255,255,0.88)">
              <rect x="0" y="8" width="3.5" height="4" rx="1"></rect>
              <rect x="5" y="5.5" width="3.5" height="6.5" rx="1"></rect>
              <rect x="10" y="2.5" width="3.5" height="9.5" rx="1"></rect>
              <rect x="15" y="0" width="3" height="12" rx="1"></rect>
            </svg>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
              <ellipse cx="8" cy="10.5" rx="1.6" ry="1.6" fill="rgba(255,255,255,0.88)"></ellipse>
              <path d="M4.5 7.2C5.7 5.6 6.8 4.8 8 4.8S10.3 5.6 11.5 7.2" stroke="rgba(255,255,255,0.88)" stroke-width="1.4" stroke-linecap="round" fill="none"></path>
              <path d="M1.5 4C3.3 1.8 5.5 0.6 8 0.6S12.7 1.8 14.5 4" stroke="rgba(255,255,255,0.88)" stroke-width="1.4" stroke-linecap="round" fill="none"></path>
            </svg>
            <svg width="26" height="12" viewBox="0 0 26 12" fill="none">
              <rect x="0.5" y="0.5" width="22" height="11" rx="3.5" stroke="rgba(255,255,255,0.55)"></rect>
              <rect x="23" y="4" width="2.5" height="4" rx="1" fill="rgba(255,255,255,0.55)"></rect>
              <rect x="2" y="2" width="18" height="8" rx="2" fill="rgba(255,255,255,0.88)"></rect>
            </svg>
          </div>
        </div>

        <!-- Logo row (always LTR) -->
        <div dir="ltr" style="display:flex;align-items:center;gap:10px;padding:0 24px">
          <div style="width:38px;height:38px;background:rgba(255,255,255,0.18);border-radius:12px;display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(255,255,255,0.3)">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
              <path d="M11 3C7.5 3 4 5.5 4 9c0 2.5 1.5 4.5 4 5.5L11 19l3-4.5c2.5-1 4-3 4-5.5 0-3.5-3.5-6-7-6z" fill="white" opacity="0.9"></path>
              <circle cx="11" cy="9" r="2.5" fill="rgba(229,57,53,0.8)"></circle>
            </svg>
          </div>
          <div>
            <div style="font-size:17px;font-weight:800;color:#fff;letter-spacing:-0.4px;line-height:1">GrandHyper</div>
            <div style="font-size:11px;color:rgba(255,255,255,0.62);font-weight:500;margin-top:1px;letter-spacing:0.1px">{{ tagline }}</div>
          </div>
          <!-- Lang toggle (always LTR, pushed right) -->
          <div dir="ltr" style="margin-left:auto;background:rgba(255,255,255,0.16);border-radius:22px;padding:3px;display:flex;gap:2px;border:1px solid rgba(255,255,255,0.2)">
            <button onClick="{{ switchToEn }}" style="{{ toggleEnStyle }}">EN</button>
            <button onClick="{{ switchToAr }}" style="{{ toggleArStyle }}">عربي</button>
          </div>
        </div>

        <!-- Headline + subtitle -->
        <div dir="{{ dir }}" style="padding:18px 24px 0">
          <div style="{{ headlineStyle }}">{{ headline }}</div>
          <div style="{{ subtitleStyle }}">{{ subtitle }}</div>
        </div>

      </div>

      <!-- ══ BODY ══ -->
      <div dir="{{ dir }}" style="{{ bodyStyle }}">

        <!-- Section label -->
        <div style="{{ sectionLabelStyle }}">{{ sectionLabel }}</div>

        <!-- Country cards -->
        <div style="display:flex;flex-direction:column;gap:10px;margin-top:14px">
          <sc-for list="{{ countryCards }}" as="card" hint-placeholder-count="4">
            <div onClick="{{ card.onSelect }}" style="{{ card.cardStyle }}" style-hover="{{ card.cardHoverStyle }}" style-active="{{ card.cardActiveStyle }}">

              <!-- Flag bubble -->
              <div style="{{ card.flagBubbleStyle }}">
                <span style="font-size:26px;line-height:1;display:block">{{ card.flag }}</span>
              </div>

              <!-- Text block -->
              <div style="flex:1;min-width:0">
                <div style="{{ card.nameStyle }}">{{ card.name }}</div>
                <div style="{{ card.subNameStyle }}">{{ card.subName }}</div>
              </div>

              <!-- Selection ring -->
              <div style="{{ card.ringStyle }}">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none" style="{{ card.checkStyle }}">
                  <path d="M2.5 6.5l3 3 5-5.5" stroke="white" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </div>

            </div>
          </sc-for>
        </div>

        <!-- Spacer -->
        <div style="flex:1"></div>

        <!-- CTA area -->
        <div style="padding-bottom:24px">
          <button onClick="{{ onContinue }}" style="{{ btnStyle }}" style-active="{{ btnActiveStyle }}">
            <span style="display:flex;align-items:center;justify-content:center;gap:8px">
              {{ btnText }}
              <sc-if value="{{ btnEnabled }}" hint-placeholder-val="{{ false }}">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                  <path d="M6 4l6 5-6 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </sc-if>
            </span>
          </button>
          <div style="width:134px;height:5px;background:#000;border-radius:3px;margin:18px auto 0;opacity:0.1"></div>
        </div>

      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    selectedCountry: null,
    lang: 'en',
  };

  countries = [
    {
      id: 'uae',
      flag: '🇦🇪',
      nameEn: 'United Arab Emirates',
      nameAr: 'الإمارات العربية المتحدة',
      shortEn: 'UAE',
      shortAr: 'الإمارات',
      flagBg: 'rgba(0,114,47,0.12)',
      flagBgSel: 'rgba(0,114,47,0.18)',
    },
    {
      id: 'kw',
      flag: '🇰🇼',
      nameEn: 'Kuwait',
      nameAr: 'الكويت',
      shortEn: 'Kuwait',
      shortAr: 'الكويت',
      flagBg: 'rgba(0,96,48,0.12)',
      flagBgSel: 'rgba(0,96,48,0.18)',
    },
    {
      id: 'qa',
      flag: '🇶🇦',
      nameEn: 'Qatar',
      nameAr: 'قطر',
      shortEn: 'Qatar',
      shortAr: 'قطر',
      flagBg: 'rgba(141,27,61,0.1)',
      flagBgSel: 'rgba(141,27,61,0.16)',
    },
    {
      id: 'sa',
      flag: '🇸🇦',
      nameEn: 'Saudi Arabia',
      nameAr: 'المملكة العربية السعودية',
      shortEn: 'KSA',
      shortAr: 'السعودية',
      flagBg: 'rgba(0,108,53,0.12)',
      flagBgSel: 'rgba(0,108,53,0.18)',
    },
  ];

  renderVals() {
    const { selectedCountry, lang } = this.state;
    const isAr = lang === 'ar';
    const selected = this.countries.find(c => c.id === selectedCountry);

    const strings = {
      tagline:      isAr ? 'بقالة طازجة وأكثر' : 'Fresh Groceries & More',
      headline:     isAr ? 'أين تريد التسوق؟' : 'Where would you\nlike to shop?',
      subtitle:     isAr ? 'اختر دولتك للحصول على تجربة تسوق مخصصة' : 'Select your country to personalise your experience',
      sectionLabel: isAr ? 'الدول المتاحة' : 'Available Countries',
      btnActive:    selected
        ? (isAr ? `ابدأ في ${selected.shortAr}` : `Onboard in ${selected.shortEn}`)
        : (isAr ? 'اختر دولة أولاً' : 'Select a Country'),
    };

    const ff = isAr
      ? "'Cairo','Plus Jakarta Sans',sans-serif"
      : "'Plus Jakarta Sans',sans-serif";

    return {
      dir: isAr ? 'rtl' : 'ltr',
      tagline: strings.tagline,
      headline: strings.headline,
      subtitle: strings.subtitle,
      sectionLabel: strings.sectionLabel,
      btnText: strings.btnActive,
      btnEnabled: !!selected,

      headlineStyle: {
        fontSize: '26px',
        fontWeight: '800',
        color: '#fff',
        whiteSpace: 'pre-line',
        lineHeight: '1.2',
        letterSpacing: isAr ? '-0.2px' : '-0.7px',
        fontFamily: ff,
      },
      subtitleStyle: {
        fontSize: '13px',
        color: 'rgba(255,255,255,0.68)',
        fontWeight: '400',
        marginTop: '6px',
        lineHeight: '1.5',
        fontFamily: ff,
      },
      sectionLabelStyle: {
        fontSize: '11px',
        fontWeight: '700',
        color: '#9a9a9a',
        letterSpacing: isAr ? '0' : '1px',
        textTransform: isAr ? 'none' : 'uppercase',
        fontFamily: ff,
      },
      bodyStyle: {
        flex: '1',
        display: 'flex',
        flexDirection: 'column',
        padding: '22px 20px 0',
        overflow: 'hidden',
        fontFamily: ff,
      },
      btnStyle: {
        width: '100%',
        height: '58px',
        background: selected ? '#E53935' : '#DCDCDC',
        border: 'none',
        borderRadius: '29px',
        color: selected ? '#fff' : '#aaa',
        fontSize: '16px',
        fontWeight: '700',
        cursor: selected ? 'pointer' : 'default',
        fontFamily: ff,
        letterSpacing: isAr ? '0' : '0.2px',
        transition: 'background 0.3s ease, color 0.3s ease, transform 0.12s ease',
        boxShadow: selected ? '0 8px 28px rgba(229,57,53,0.35)' : 'none',
      },
      btnActiveStyle: selected ? 'transform:scale(0.97)' : '',

      toggleEnStyle: {
        padding: '7px 14px',
        borderRadius: '18px',
        background: !isAr ? '#fff' : 'transparent',
        color: !isAr ? '#E53935' : 'rgba(255,255,255,0.75)',
        border: 'none',
        fontWeight: !isAr ? '700' : '500',
        fontSize: '13px',
        cursor: 'pointer',
        transition: 'all 0.22s ease',
        fontFamily: "'Plus Jakarta Sans',sans-serif",
        letterSpacing: '0.3px',
      },
      toggleArStyle: {
        padding: '7px 14px',
        borderRadius: '18px',
        background: isAr ? '#fff' : 'transparent',
        color: isAr ? '#E53935' : 'rgba(255,255,255,0.75)',
        border: 'none',
        fontWeight: isAr ? '700' : '400',
        fontSize: '13px',
        cursor: 'pointer',
        transition: 'all 0.22s ease',
        fontFamily: "'Cairo',sans-serif",
      },

      switchToEn: () => this.setState({ lang: 'en' }),
      switchToAr: () => this.setState({ lang: 'ar' }),
      onContinue: selected ? () => {} : () => {},

      countryCards: this.countries.map(c => {
        const isSel = c.id === selectedCountry;
        const mainName = isAr ? c.nameAr : c.nameEn;
        const subName  = isAr ? c.nameEn : c.nameAr;

        return {
          flag: c.flag,
          name: mainName,
          subName: subName,
          selected: isSel,
          onSelect: () => this.setState({ selectedCountry: c.id }),

          cardStyle: {
            display: 'flex',
            alignItems: 'center',
            gap: '14px',
            padding: '14px 16px',
            background: isSel ? '#fff' : '#fff',
            border: isSel ? '2px solid #E53935' : '2px solid #E8E8E5',
            borderRadius: '18px',
            cursor: 'pointer',
            transition: 'all 0.22s ease',
            boxShadow: isSel
              ? '0 6px 24px rgba(229,57,53,0.15)'
              : '0 2px 8px rgba(0,0,0,0.04)',
            animation: isSel ? 'cardPop 0.28s ease forwards' : 'none',
          },
          cardHoverStyle: 'border-color:#E53935;box-shadow:0 4px 16px rgba(229,57,53,0.1)',
          cardActiveStyle: 'transform:scale(0.985)',

          flagBubbleStyle: {
            width: '52px',
            height: '52px',
            borderRadius: '14px',
            background: isSel ? c.flagBgSel : c.flagBg,
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            flexShrink: '0',
            transition: 'background 0.22s ease',
          },

          nameStyle: {
            fontSize: isAr ? '15px' : '15px',
            fontWeight: '700',
            color: '#141414',
            letterSpacing: isAr ? '0' : '-0.2px',
            lineHeight: '1.2',
            fontFamily: ff,
          },
          subNameStyle: {
            fontSize: '12px',
            color: '#a0a0a0',
            fontWeight: '400',
            marginTop: '3px',
            fontFamily: isAr
              ? "'Plus Jakarta Sans',sans-serif"
              : "'Cairo',sans-serif",
          },

          ringStyle: {
            width: '26px',
            height: '26px',
            borderRadius: '50%',
            border: isSel ? 'none' : '2px solid #D8D8D8',
            background: isSel ? '#E53935' : '#F8F8F8',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            flexShrink: '0',
            transition: 'all 0.22s ease',
            boxShadow: isSel ? '0 3px 10px rgba(229,57,53,0.3)' : 'none',
          },
          checkStyle: {
            opacity: isSel ? 1 : 0,
            transform: isSel ? 'scale(1)' : 'scale(0.4)',
            transition: 'all 0.22s ease',
          },
        };
      }),
    };
  }
}
</script>
</body>
</html>
