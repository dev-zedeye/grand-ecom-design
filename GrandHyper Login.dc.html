<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes floatBadge {
      0%,100% { transform:translateY(0px); }
      50%     { transform:translateY(-4px); }
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { margin:0; }
    input::placeholder { color:#A0A0B8; }
    input:focus { outline:none; }
  </style>
</helmet>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(150deg,#0c0c1e 0%,#18102e 55%,#081820 100%);padding:48px 24px;position:relative;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif">

  <!-- Ambient glow -->
  <div style="position:absolute;width:680px;height:680px;border-radius:50%;background:#E53935;opacity:0.1;filter:blur(140px);left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none"></div>

  <!-- Phone bezel -->
  <div style="width:390px;height:844px;border-radius:54px;background:#000;position:relative;overflow:hidden;flex-shrink:0;z-index:1;box-shadow:0 0 0 1.5px #2e2e3a,0 0 0 3.5px #111116,0 80px 180px rgba(0,0,0,0.9),inset 0 0 0 1px rgba(255,255,255,0.06)">

    <!-- Dynamic island -->
    <div style="position:absolute;top:12px;left:50%;transform:translateX(-50%);width:130px;height:37px;background:#000;border-radius:20px;z-index:30;pointer-events:none"></div>

    <!-- Screen — flex column -->
    <div style="width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;background:#FAFAF8;font-family:'Plus Jakarta Sans',sans-serif">

      <!-- ══ RED HEADER ══ -->
      <div style="flex-shrink:0;background:linear-gradient(148deg,#FF5252 0%,#E53935 45%,#C62828 100%);border-radius:0 0 36px 36px;padding-bottom:32px;position:relative;overflow:hidden;box-shadow:0 12px 40px rgba(229,57,53,0.3)">

        <!-- Subtle bg circle -->
        <div style="position:absolute;width:280px;height:280px;border-radius:50%;background:rgba(255,255,255,0.07);right:-60px;top:-80px;pointer-events:none"></div>
        <div style="position:absolute;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.05);left:-40px;bottom:-40px;pointer-events:none"></div>

        <!-- Status bar -->
        <div style="height:56px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 12px;position:relative;z-index:2">
          <span style="color:rgba(255,255,255,0.92);font-weight:700;font-size:16px;letter-spacing:-0.4px">9:41</span>
          <div style="display:flex;gap:6px;align-items:center">
            <svg width="18" height="12" viewBox="0 0 18 12" fill="rgba(255,255,255,0.88)">
              <rect x="0" y="8" width="3.5" height="4" rx="1"></rect><rect x="5" y="5.5" width="3.5" height="6.5" rx="1"></rect><rect x="10" y="2.5" width="3.5" height="9.5" rx="1"></rect><rect x="15" y="0" width="3" height="12" rx="1"></rect>
            </svg>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
              <ellipse cx="8" cy="10.5" rx="1.6" ry="1.6" fill="rgba(255,255,255,0.88)"></ellipse>
              <path d="M4.5 7.2C5.7 5.6 6.8 4.8 8 4.8S10.3 5.6 11.5 7.2" stroke="rgba(255,255,255,0.88)" stroke-width="1.4" stroke-linecap="round"></path>
              <path d="M1.5 4C3.3 1.8 5.5 0.6 8 0.6S12.7 1.8 14.5 4" stroke="rgba(255,255,255,0.88)" stroke-width="1.4" stroke-linecap="round"></path>
            </svg>
            <svg width="26" height="12" viewBox="0 0 26 12" fill="none">
              <rect x="0.5" y="0.5" width="22" height="11" rx="3.5" stroke="rgba(255,255,255,0.5)"></rect>
              <rect x="23" y="4" width="2.5" height="4" rx="1" fill="rgba(255,255,255,0.5)"></rect>
              <rect x="2" y="2" width="18" height="8" rx="2" fill="rgba(255,255,255,0.88)"></rect>
            </svg>
          </div>
        </div>

        <!-- Logo + back row -->
        <div style="display:flex;align-items:center;gap:10px;padding:0 24px;position:relative;z-index:2">
          <button style="width:36px;height:36px;background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.28);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.15s ease" style-hover="background:rgba(255,255,255,0.28)">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M10 3.5L5.5 8 10 12.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </button>
          <div style="display:flex;align-items:center;gap:8px;margin-left:4px">
            <div style="width:32px;height:32px;background:rgba(255,255,255,0.18);border-radius:10px;display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(255,255,255,0.3)">
              <svg width="18" height="18" viewBox="0 0 22 22" fill="none">
                <path d="M11 3C7.5 3 4 5.5 4 9c0 2.5 1.5 4.5 4 5.5L11 19l3-4.5c2.5-1 4-3 4-5.5 0-3.5-3.5-6-7-6z" fill="white" opacity="0.9"></path>
                <circle cx="11" cy="9" r="2.5" fill="rgba(229,57,53,0.75)"></circle>
              </svg>
            </div>
            <span style="font-size:15px;font-weight:800;color:#fff;letter-spacing:-0.3px">GrandHyper</span>
          </div>
        </div>

        <!-- Welcome heading -->
        <div style="padding:20px 24px 0;position:relative;z-index:2">
          <div style="font-size:36px;font-weight:800;color:#fff;line-height:1.12;letter-spacing:-1px">Welcome<br>Back! 👋</div>
          <div style="font-size:14px;color:rgba(255,255,255,0.7);margin-top:8px;line-height:1.55;font-weight:400">Sign in to continue your fresh grocery journey</div>
        </div>

      </div>

      <!-- ══ WHITE CARD (scrollable body) ══ -->
      <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;padding:28px 24px 0;background:#FAFAF8">

        <!-- Tab bar -->
        <div style="display:flex;background:#EEECEA;border-radius:16px;padding:4px;gap:4px;flex-shrink:0">
          <button onClick="{{ switchToEmail }}" style="{{ emailTabStyle }}" style-active="transform:scale(0.97)">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <rect x="1" y="3" width="13" height="9" rx="2" stroke="{{ emailTabIconColor }}" stroke-width="1.5"></rect>
              <path d="M1 5l6.5 4.5L14 5" stroke="{{ emailTabIconColor }}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
            Email
          </button>
          <button onClick="{{ switchToPhone }}" style="{{ phoneTabStyle }}" style-active="transform:scale(0.97)">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <rect x="3" y="1" width="9" height="13" rx="2.5" stroke="{{ phoneTabIconColor }}" stroke-width="1.5"></rect>
              <circle cx="7.5" cy="11.5" r="0.8" fill="{{ phoneTabIconColor }}"></circle>
            </svg>
            Phone
          </button>
        </div>

        <!-- ── EMAIL TAB ── -->
        <sc-if value="{{ isEmail }}" hint-placeholder-val="{{ true }}">
          <div style="margin-top:22px;display:flex;flex-direction:column;gap:12px;animation:fadeUp 0.22s ease">

            <!-- Email -->
            <div style="display:flex;align-items:center;gap:12px;background:#EEECEA;border-radius:16px;height:58px;padding:0 18px;border:1.5px solid transparent;transition:border-color 0.15s ease" style-focus-within="border-color:#E53935">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="flex-shrink:0">
                <rect x="1" y="4" width="16" height="11" rx="2.5" stroke="#A0A0B8" stroke-width="1.5"></rect>
                <path d="M1 6l8 5.5L17 6" stroke="#A0A0B8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
              <input type="email" placeholder="Email address" style="flex:1;background:transparent;border:none;font-size:15px;color:#141414;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;height:100%" />
            </div>

            <!-- Password -->
            <div style="display:flex;align-items:center;gap:12px;background:#EEECEA;border-radius:16px;height:58px;padding:0 18px;border:1.5px solid transparent">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="flex-shrink:0">
                <rect x="3" y="8" width="12" height="9" rx="2.5" stroke="#A0A0B8" stroke-width="1.5"></rect>
                <path d="M6 8V6a3 3 0 0 1 6 0v2" stroke="#A0A0B8" stroke-width="1.5" stroke-linecap="round"></path>
                <circle cx="9" cy="12.5" r="1.2" fill="#A0A0B8"></circle>
              </svg>
              <input type="{{ pwType }}" placeholder="Password" style="flex:1;background:transparent;border:none;font-size:15px;color:#141414;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;height:100%" />
              <button onClick="{{ togglePw }}" style="background:transparent;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;flex-shrink:0">
                <sc-if value="{{ showPw }}" hint-placeholder-val="{{ false }}">
                  <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M1 10s3-6 9-6 9 6 9 6-3 6-9 6-9-6-9-6z" stroke="#A0A0B8" stroke-width="1.5"></path>
                    <circle cx="10" cy="10" r="2.5" stroke="#A0A0B8" stroke-width="1.5"></circle>
                  </svg>
                </sc-if>
                <sc-if value="{{ hidePw }}" hint-placeholder-val="{{ true }}">
                  <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M3 3l14 14M8.5 8.7A2.5 2.5 0 0013.3 13M6.2 6a9.4 9.4 0 00-5.2 4s3 6 9 6c1.7 0 3.2-.5 4.6-1.2" stroke="#A0A0B8" stroke-width="1.5" stroke-linecap="round"></path>
                    <path d="M11.5 5.1A9 9 0 0119 10s-1 2.2-2.8 3.8" stroke="#A0A0B8" stroke-width="1.5" stroke-linecap="round"></path>
                  </svg>
                </sc-if>
              </button>
            </div>

            <!-- Forgot password -->
            <div style="display:flex;justify-content:flex-end;margin-top:-4px">
              <button style="background:transparent;border:none;font-size:13px;font-weight:600;color:#E53935;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:2px 0">Forgot Password?</button>
            </div>

            <!-- Sign In -->
            <button style="width:100%;height:58px;background:#E53935;border:none;border-radius:29px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:0.2px;box-shadow:0 10px 28px rgba(229,57,53,0.35);transition:transform 0.12s ease,opacity 0.12s ease;margin-top:4px" style-hover="opacity:0.92" style-active="transform:scale(0.97)">Sign In</button>

          </div>
        </sc-if>

        <!-- ── PHONE TAB ── -->
        <sc-if value="{{ isPhone }}" hint-placeholder-val="{{ false }}">
          <div style="margin-top:22px;display:flex;flex-direction:column;gap:12px;animation:fadeUp 0.22s ease">

            <!-- Country + phone -->
            <div style="display:flex;align-items:stretch;background:#EEECEA;border-radius:16px;height:58px;overflow:hidden;border:1.5px solid transparent">
              <button style="display:flex;align-items:center;gap:7px;padding:0 14px;background:transparent;border:none;border-right:1.5px solid #DDD CDE0;cursor:pointer;flex-shrink:0;transition:background 0.15s ease" style-hover="background:rgba(0,0,0,0.04)">
                <span style="font-size:20px;line-height:1">🇦🇪</span>
                <span style="font-size:14px;font-weight:700;color:#141414;font-family:'Plus Jakarta Sans',sans-serif">+971</span>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                  <path d="M3 4.5l3 3 3-3" stroke="#A0A0B8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </button>
              <input type="tel" placeholder="Phone number" style="flex:1;background:transparent;border:none;padding:0 16px;font-size:15px;color:#141414;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500" />
            </div>

            <!-- OTP info -->
            <div style="display:flex;align-items:flex-start;gap:10px;padding:13px 16px;background:rgba(229,57,53,0.07);border-radius:14px;border:1px solid rgba(229,57,53,0.12)">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;margin-top:1px">
                <circle cx="8" cy="8" r="7" stroke="#E53935" stroke-width="1.4"></circle>
                <path d="M8 5v3.5M8 10.5v.5" stroke="#E53935" stroke-width="1.5" stroke-linecap="round"></path>
              </svg>
              <span style="font-size:13px;color:#C62828;line-height:1.5;font-weight:500">A 6-digit OTP will be sent to your number via SMS.</span>
            </div>

            <!-- Send code -->
            <button style="width:100%;height:58px;background:#E53935;border:none;border-radius:29px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:0.2px;box-shadow:0 10px 28px rgba(229,57,53,0.35);transition:transform 0.12s ease,opacity 0.12s ease;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px" style-hover="opacity:0.92" style-active="transform:scale(0.97)">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M2 9l14-6-6 14-2-5z" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
              Send Verification Code
            </button>

          </div>
        </sc-if>

        <!-- Spacer -->
        <div style="flex:1;min-height:20px"></div>

        <!-- Social login (tweakable) -->
        <sc-if value="{{ showSocialLogin }}" hint-placeholder-val="{{ false }}">
          <div style="flex-shrink:0">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
              <div style="flex:1;height:1px;background:#E0DFD9"></div>
              <span style="font-size:12px;color:#B0B0C0;font-weight:500;white-space:nowrap">Or continue with</span>
              <div style="flex:1;height:1px;background:#E0DFD9"></div>
            </div>
            <div style="display:flex;gap:12px;margin-bottom:16px">
              <button style="flex:1;height:52px;background:#fff;border:1.5px solid #E8E7E2;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;font-size:14px;font-weight:600;color:#141414;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 2px 8px rgba(0,0,0,0.05);transition:border-color 0.15s ease,box-shadow 0.15s ease" style-hover="border-color:#E53935;box-shadow:0 4px 12px rgba(229,57,53,0.1)">
                <svg width="18" height="18" viewBox="0 0 18 18"><path d="M16.5 9.18c0-.57-.05-1.12-.14-1.64H9v3.1h4.21a3.6 3.6 0 01-1.56 2.36v1.96h2.52c1.48-1.36 2.33-3.36 2.33-5.78z" fill="#4285F4"/><path d="M9 17c2.12 0 3.9-.7 5.2-1.9l-2.52-1.96c-.7.47-1.59.75-2.68.75-2.06 0-3.8-1.39-4.42-3.26H2v2.02A8 8 0 009 17z" fill="#34A853"/><path d="M4.58 10.63A4.8 4.8 0 014.33 9c0-.56.1-1.1.25-1.63V5.35H2A8 8 0 001 9c0 1.3.31 2.52.86 3.6l2.72-2z" fill="#FBBC05"/><path d="M9 3.75c1.16 0 2.2.4 3.02 1.18l2.26-2.26A8 8 0 002 5.35L4.72 7.4C5.33 5.52 7.06 3.75 9 3.75z" fill="#EA4335"/></svg>
                Google
              </button>
              <button style="flex:1;height:52px;background:#fff;border:1.5px solid #E8E7E2;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;font-size:14px;font-weight:600;color:#141414;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 2px 8px rgba(0,0,0,0.05);transition:border-color 0.15s ease" style-hover="border-color:#141414">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="#141414"><path d="M13.5 1.5A4.5 4.5 0 0 1 9.5 6H9V1.5h4.5zM9 6h-.5A4.5 4.5 0 0 1 4.5 1.5H9V6zM9 6.5v5h-4A4.5 4.5 0 0 1 .5 7v-.5H9zM9.5 6.5H18V7a4.5 4.5 0 0 1-4.5 4.5H9.5V6.5zM4.5 12h5V17H7A2.5 2.5 0 0 1 4.5 14.5V12zM9 12h5v2.5A2.5 2.5 0 0 1 11.5 17H9v-5z"></path></svg>
                Apple
              </button>
            </div>
          </div>
        </sc-if>

        <!-- Sign up row -->
        <div style="display:flex;align-items:center;justify-content:center;gap:6px;flex-shrink:0">
          <span style="font-size:14px;color:#9898A8;font-weight:500">Don't have an account?</span>
          <button style="background:transparent;border:none;font-size:14px;font-weight:700;color:#E53935;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:0">Sign Up</button>
        </div>

        <!-- Continue as Guest -->
        <sc-if value="{{ showGuestLogin }}" hint-placeholder-val="{{ true }}">
          <div style="display:flex;justify-content:center;margin-top:12px;flex-shrink:0">
            <button style="background:transparent;border:none;font-size:14px;font-weight:600;color:#9898A8;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 0;transition:color 0.15s ease" style-hover="color:#141414">Continue as Guest</button>
          </div>
        </sc-if>

        <!-- Terms -->
        <div style="text-align:center;font-size:12px;color:#B8B8C8;line-height:1.6;margin-top:14px;padding-bottom:16px;flex-shrink:0">
          By signing in you agree to our <span style="color:#E53935;font-weight:600">Terms of Service</span> and <span style="color:#E53935;font-weight:600">Privacy Policy</span>
        </div>

        <!-- Home indicator -->
        <div style="width:134px;height:5px;background:#000;border-radius:3px;margin:0 auto 20px;opacity:0.1;flex-shrink:0"></div>

      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 390, &quot;height&quot;: 844},
  &quot;showSocialLogin&quot;: {
    &quot;editor&quot;: &quot;boolean&quot;,
    &quot;default&quot;: false
  },
  &quot;showGuestLogin&quot;: {
    &quot;editor&quot;: &quot;boolean&quot;,
    &quot;default&quot;: true
  },
  &quot;defaultTab&quot;: {
    &quot;editor&quot;: &quot;enum&quot;,
    &quot;options&quot;: [&quot;email&quot;, &quot;phone&quot;],
    &quot;default&quot;: &quot;email&quot;
  }
}">
class Component extends DCLogic {
  state = {
    activeTab: this.props?.defaultTab ?? 'email',
    showPw: false,
  };

  renderVals() {
    const { activeTab, showPw } = this.state;
    const isEmail = activeTab === 'email';
    const isPhone = activeTab === 'phone';

    const activeTabStyle = {
      flex: 1,
      height: '48px',
      borderRadius: '12px',
      background: '#fff',
      border: 'none',
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      gap: '7px',
      fontWeight: '700',
      color: '#E53935',
      fontSize: '14px',
      cursor: 'pointer',
      fontFamily: "'Plus Jakarta Sans',sans-serif",
      boxShadow: '0 2px 12px rgba(0,0,0,0.1)',
      transition: 'all 0.22s ease',
      letterSpacing: '0.1px',
    };
    const inactiveTabStyle = {
      flex: 1,
      height: '48px',
      borderRadius: '12px',
      background: 'transparent',
      border: 'none',
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      gap: '7px',
      fontWeight: '500',
      color: '#A0A0B8',
      fontSize: '14px',
      cursor: 'pointer',
      fontFamily: "'Plus Jakarta Sans',sans-serif",
      transition: 'all 0.22s ease',
      letterSpacing: '0.1px',
    };

    return {
      isEmail,
      isPhone,

      emailTabStyle:     isEmail ? activeTabStyle : inactiveTabStyle,
      phoneTabStyle:     isPhone ? activeTabStyle : inactiveTabStyle,
      emailTabIconColor: isEmail ? '#E53935' : '#A0A0B8',
      phoneTabIconColor: isPhone ? '#E53935' : '#A0A0B8',

      showPw,
      hidePw: !showPw,
      pwType: showPw ? 'text' : 'password',
      togglePw: () => this.setState(s => ({ showPw: !s.showPw })),

      switchToEmail: () => this.setState({ activeTab: 'email' }),
      switchToPhone: () => this.setState({ activeTab: 'phone' }),

      showSocialLogin: this.props?.showSocialLogin ?? false,
      showGuestLogin:  this.props?.showGuestLogin  ?? true,
    };
  }
}
</script>
</body>
</html>
